<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/index.css">
    <title>Portal de notícias</title>
</head>
<body>
    <header class="container">
        <nav id="primary" class="grid grid-flow-cols">

            </div>

            <div>
                <img src="assets/icons/Logo.svg" alt="TechNews logo">

            <div>
                <img src="assets/icons/MagnifyingGlass.svg" alt="Ferramenta de busca">
                <strong>Buscar</strong>
            </div>
        </nav>
        <nav id="secondary" class="grid grid-flow-cols">
            <a href="#">Intigência Artificial</a>
            <a href="#">Blockchain</a>

            <a href="#">Internet</a>
            <a href="#">Vestíveis</a>
            <a href="#">Realidade aumentada</a>

    <main class="container">
        <section id="featured" class="grid grid-flow-cols gap-16">
            <div>
                <img src="assets/Image 01.png" alt="">
            </div>
            <div class="grid grid-cols-2 gap-16">
                <div>
                    <img src="assets/Image 02.png" alt="">
                </div>
                <div>
                    <img src="assets/Image 03.png" alt="">

                <div>
                    <img src="assets/Image 04.png" alt="">

                <div>
                    <img src="assets/Image 05.png" alt="">
                </div>
